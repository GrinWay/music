services:

  frankenphp:
    ports:
      - "8111:80"
    environment:
      SERVER_NAME: 'http://localhost:80'
      PHP_INI_MEMORY_LIMIT: '512M'
      PHP_INI_MAX_EXECUTION_TIME: '10'
      APP_ENV: 'dev'
      PHP_IDE_CONFIG: 'serverName=music'
    env_file:
      - './../.env'
      - './../.env.dev'
      - './../.env.test'
      - './../.env.dev.local'

  music_memcached:
    ports:
      - "11211:11211"
